mutation UpdateProfile($data: UserUpdateInput!) {
  updateProfile(data: $data) {
    id
    email
    avatarUrl
    profile {
      fullName
      gender
      age
      bio
    }
    measurements {
      heightCm
      weightKg
      goalWeightKg
      chestCm
      waistCm
      thighCm
      armCm
      activityLevel
      nutritionGoal
    }
  }
}
